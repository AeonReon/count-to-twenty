<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7c3aed">
<title>Count to Twenty · aha!</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<style>
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
html,body{
  min-height:100%;
  font-family:'Arial Rounded MT Bold','Nunito','Quicksand',system-ui,-apple-system,Arial,sans-serif;
  background:linear-gradient(180deg,#fef3c7 0%,#fde68a 30%,#fbcfe8 75%,#dbeafe 100%);
  color:#1e3a8a; overflow-x:hidden;
}
.hero{
  width:100%; text-align:center;
  padding:clamp(28px,7vh,52px) 16px 18px;
  position:relative; overflow:hidden;
}
.hero-emoji{ font-size:clamp(56px,14vw,96px); display:block; line-height:1;
  animation:heroFloat 2.4s ease-in-out infinite; filter:drop-shadow(0 6px 12px rgba(0,0,0,0.18)); }
@keyframes heroFloat{ 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-10px) rotate(3deg)} }
.hero-title{
  font-size:clamp(40px,11vw,72px); color:#fff;
  -webkit-text-stroke:3px #1e3a8a;
  text-shadow:4px 6px 0 #f472b6, 0 8px 14px rgba(0,0,0,0.18);
  letter-spacing:1px; margin-top:6px;
}
.hero-sub{
  font-size:clamp(14px,3.4vw,20px); color:#1e3a8a; font-weight:900;
  text-shadow:2px 2px 0 rgba(255,255,255,0.6); margin-top:8px;
}

.list{ width:100%; max-width:680px; margin:0 auto;
  padding:18px 14px 60px; display:grid; gap:14px;
  grid-template-columns:1fr 1fr;
}
@media (max-width:520px){ .list{ grid-template-columns:1fr; } }

.card{
  background:#fff; border-radius:22px; overflow:hidden;
  box-shadow:0 6px 22px rgba(0,0,0,0.12); border:4px solid transparent;
  cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
  text-decoration:none; color:inherit;
  display:flex; flex-direction:column;
}
.card:active{ transform:scale(0.97); }
.card-header{
  padding:18px 16px; display:flex; align-items:center; gap:12px;
  color:#fff; min-height:96px;
}
.card-emoji{ font-size:clamp(34px,9vw,52px); line-height:1; filter:drop-shadow(0 3px 5px rgba(0,0,0,0.25)); }
.card-info{ flex:1; }
.card-title{
  font-size:clamp(16px,4vw,22px); font-weight:900;
  text-shadow:1px 2px 0 rgba(0,0,0,0.25); line-height:1.1;
}
.card-range{
  font-size:clamp(12px,3vw,16px); font-weight:900; opacity:0.92;
  margin-top:4px;
}
.card-body{
  padding:12px 16px 16px; display:flex; align-items:center; justify-content:space-between;
}
.card-game-no{
  background:#1e3a8a; color:#fff;
  border-radius:12px; padding:4px 12px;
  font-weight:900; font-size:13px; letter-spacing:0.5px;
}
.card-arrow{ font-size:24px; color:#1e3a8a; font-weight:900; }
.card-star{ font-size:18px; color:#fbbf24; }

/* Theme accent strips per card */
.t1{ border-color:#fda4af; } .t1 .card-header{ background:linear-gradient(135deg,#ef4444,#f97316); }
.t2{ border-color:#c4b5fd; } .t2 .card-header{ background:linear-gradient(135deg,#7c3aed,#a855f7); }
.t3{ border-color:#93c5fd; } .t3 .card-header{ background:linear-gradient(135deg,#0ea5e9,#3b82f6); }
.t4{ border-color:#f9a8d4; } .t4 .card-header{ background:linear-gradient(135deg,#ec4899,#f472b6); }
.t5{ border-color:#86efac; } .t5 .card-header{ background:linear-gradient(135deg,#10b981,#14b8a6); }
.t6{ border-color:#fde68a; } .t6 .card-header{ background:linear-gradient(135deg,#d97706,#ca8a04); }
.t7{ border-color:#a5b4fc; } .t7 .card-header{ background:linear-gradient(135deg,#4f46e5,#6366f1); }
.t8{ border-color:#fdba74; } .t8 .card-header{ background:linear-gradient(135deg,#ea580c,#f97316); }
.t9{ border-color:#fbcfe8; } .t9 .card-header{ background:linear-gradient(135deg,#db2777,#ec4899); }
.t10{ border-color:#bef264; } .t10 .card-header{ background:linear-gradient(135deg,#65a30d,#84cc16); }
.t11{ border-color:#fef08a; } .t11 .card-header{ background:linear-gradient(135deg,#0284c7,#0ea5e9); }
.t12{ border-color:#bbf7d0; } .t12 .card-header{ background:linear-gradient(135deg,#15803d,#16a34a); }
.t13{ border-color:#a5f3fc; } .t13 .card-header{ background:linear-gradient(135deg,#0e7490,#0891b2); }
.t14{ border-color:#bfdbfe; } .t14 .card-header{ background:linear-gradient(135deg,#1e3a8a,#3b82f6); }
.t15{ border-color:#d9f99d; } .t15 .card-header{ background:linear-gradient(135deg,#65a30d,#84cc16); }
.t16{ border-color:#fecaca; } .t16 .card-header{ background:linear-gradient(135deg,#b91c1c,#dc2626); }
.t17{ border-color:#fde68a; } .t17 .card-header{ background:linear-gradient(135deg,#b91c1c,#f59e0b); }
.t18{ border-color:#bbf7d0; } .t18 .card-header{ background:linear-gradient(135deg,#166534,#65a30d); }
.t19{ border-color:#fde68a; } .t19 .card-header{ background:linear-gradient(135deg,#0ea5e9,#fbbf24); }
.t20{ border-color:#c4b5fd; } .t20 .card-header{ background:linear-gradient(135deg,#312e81,#7c3aed); }
/* paired b-game themes — sibling palettes of their main game */
.t1b{ border-color:#bef264; } .t1b .card-header{ background:linear-gradient(135deg,#16a34a,#84cc16); }
.t2b{ border-color:#fdba74; } .t2b .card-header{ background:linear-gradient(135deg,#dc2626,#f97316); }
.t3b{ border-color:#a5b4fc; } .t3b .card-header{ background:linear-gradient(135deg,#4c1d95,#312e81); }
.t4b{ border-color:#f9a8d4; } .t4b .card-header{ background:linear-gradient(135deg,#db2777,#c084fc); }
.t5b{ border-color:#fda4af; } .t5b .card-header{ background:linear-gradient(135deg,#991b1b,#dc2626); }
.t6b{ border-color:#fde68a; } .t6b .card-header{ background:linear-gradient(135deg,#92400e,#d97706); }
.t7b{ border-color:#a5b4fc; } .t7b .card-header{ background:linear-gradient(135deg,#0f172a,#1e1b4b); }
.t8b{ border-color:#fbcfe8; } .t8b .card-header{ background:linear-gradient(135deg,#be185d,#ec4899); }
.t9b{ border-color:#ddd6fe; } .t9b .card-header{ background:linear-gradient(135deg,#7c3aed,#a855f7); }
.t10b{ border-color:#bfdbfe; } .t10b .card-header{ background:linear-gradient(135deg,#1e3a8a,#0ea5e9); }
.t11b{ border-color:#fde68a; } .t11b .card-header{ background:linear-gradient(135deg,#075985,#0284c7); }
.t12b{ border-color:#86efac; } .t12b .card-header{ background:linear-gradient(135deg,#14532d,#16a34a); }
.t13b{ border-color:#fde68a; } .t13b .card-header{ background:linear-gradient(135deg,#422006,#92400e); }
.t14b{ border-color:#cffafe; } .t14b .card-header{ background:linear-gradient(135deg,#134e4a,#0e7490); }
.t15b{ border-color:#d9f99d; } .t15b .card-header{ background:linear-gradient(135deg,#14532d,#65a30d); }
.t16b{ border-color:#fda4af; } .t16b .card-header{ background:linear-gradient(135deg,#7f1d1d,#be123c); }

.card.locked{ opacity:0.55; pointer-events:none; }
.card.locked .card-header{ filter:saturate(0.35) brightness(0.85); }
.card.locked .card-arrow{ display:none; }
.card.locked::after{
  content:'🔒'; position:absolute; top:14px; right:14px;
  font-size:26px; background:rgba(255,255,255,0.95);
  width:42px; height:42px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 8px rgba(0,0,0,0.18);
}
.card{ position:relative; }

.footer{
  text-align:center; padding:0 16px 30px;
  font-size:13px; color:#1e3a8a; opacity:0.7; font-weight:700;
}

/* Floating sparkles in background */
.bg-sparkle{
  position:fixed; pointer-events:none; z-index:0; font-size:18px;
  animation:bgFloat var(--dur,5s) ease-in-out infinite var(--delay,0s);
}
@keyframes bgFloat{
  0%,100%{ transform:translateY(0) rotate(0deg); opacity:0.35 }
  50%   { transform:translateY(-14px) rotate(20deg); opacity:0.7 }
}
</style>
</head>
<body>

<div class="hero">
  <span class="hero-emoji">🔢</span>
  <div class="hero-title">Count to Twenty</div>
  <div class="hero-sub">Two games for every number sequence — count, race, sort, compare!</div>
</div>

<div class="list" id="list"></div>

<div class="footer">Tap a game to play · Numbers grow as you go</div>

<script>
const GAMES = [
  // Pairs — each number window has two different games (different verbs)
  { n:1,  theme:'t1',  emoji:'🚀', title:'Rocket Fuel',       range:'0 – 5',  href:'games/01-rocket-fuel.html' },
  { n:'1b', theme:'t1b', emoji:'🍎', title:'Apple Tree Count', range:'0 – 5', href:'games/01b-apple-count.html' },
  { n:2,  theme:'t2',  emoji:'👻', title:'Ghost Jar',          range:'1 – 6',  href:'games/02-ghost-jar.html' },
  { n:'2b', theme:'t2b', emoji:'🦀', title:'Crab Race',         range:'1 – 6', href:'games/02b-crab-race.html' },
  { n:3,  theme:'t3',  emoji:'🎣', title:'Fish Pond',          range:'2 – 7',  href:'games/03-fish-pond.html' },
  { n:'3b', theme:'t3b', emoji:'🕷️', title:'Spider Climb',     range:'2 – 7', href:'games/03b-spider-climb.html' },
  { n:4,  theme:'t4',  emoji:'👸', title:'Princess Cupcakes',  range:'3 – 8',  href:'games/04-princess-cupcakes.html' },
  { n:'4b', theme:'t4b', emoji:'🎵', title:'Music Box',         range:'3 – 8', href:'games/04b-music-box.html' },
  { n:5,  theme:'t5',  emoji:'🐉', title:'Dragon Eggs',        range:'4 – 9',  href:'games/05-dragon-eggs.html' },
  { n:'5b', theme:'t5b', emoji:'🥚', title:'Missing Egg',       range:'4 – 9', href:'games/05b-dragon-missing.html' },
  { n:6,  theme:'t6',  emoji:'🏴‍☠️', title:'Pirate Chests',  range:'5 – 10', href:'games/06-pirate-chests.html' },
  { n:'6b', theme:'t6b', emoji:'🗺️', title:'Pirate Trail',     range:'5 – 10', href:'games/06b-pirate-trail.html' },
  { n:7,  theme:'t7',  emoji:'🛸', title:'Space Aliens',       range:'6 – 11', href:'games/07-space-aliens.html' },
  { n:'7b', theme:'t7b', emoji:'☄️', title:'Asteroid Defense',  range:'6 – 11', href:'games/07b-asteroid-defense.html' },
  { n:8,  theme:'t8',  emoji:'🧁', title:'Bakery Oven',        range:'7 – 12', href:'games/08-bakery-oven.html' },
  { n:'8b', theme:'t8b', emoji:'🌈', title:'Sprinkle Count',    range:'7 – 12', href:'games/08b-sprinkle-count.html' },
  { n:9,  theme:'t9',  emoji:'🦄', title:'Unicorn Bridge',     range:'8 – 13', href:'games/09-unicorn-bridge.html' },
  { n:'9b', theme:'t9b', emoji:'🦄', title:'Unicorn Compare',   range:'8 – 13', href:'games/09b-unicorn-compare.html' },
  { n:10, theme:'t10', emoji:'🎈', title:'Hot Air Balloons',   range:'9 – 14', href:'games/10-hot-air-balloons.html' },
  { n:'10b', theme:'t10b', emoji:'🎈', title:'Balloon Race',    range:'9 – 14', href:'games/10b-balloon-race.html' },
  { n:11, theme:'t11', emoji:'🦆', title:'Five Little Ducks',  range:'10 – 15', href:'games/11-five-little-ducks.html' },
  { n:'11b', theme:'t11b', emoji:'🐤', title:'Duckling Parade',  range:'10 – 15', href:'games/11b-duckling-parade.html' },
  { n:12, theme:'t12', emoji:'🦕', title:'Dino Park',          range:'11 – 16', href:'games/12-dino-park.html' },
  { n:'12b', theme:'t12b', emoji:'🐾', title:'Dino Tracks',     range:'11 – 16', href:'games/12b-dino-footprints.html' },
  { n:13, theme:'t13', emoji:'🦈', title:'Shark Escape',       range:'12 – 17', href:'games/13-mermaid-pearl-dive.html' },
  { n:'13b', theme:'t13b', emoji:'🧭', title:'Pirate Compass',  range:'12 – 17', href:'games/13b-compass-missing.html' },
  { n:14, theme:'t14', emoji:'⛄', title:'Snowman Build',      range:'13 – 18', href:'games/14-snowman-build.html' },
  { n:'14b', theme:'t14b', emoji:'🐧', title:'Penguin Slide',   range:'13 – 18', href:'games/14b-penguin-slide.html' },
  { n:15, theme:'t15', emoji:'🦋', title:'Bug Catch',           range:'14 – 19', href:'games/15-bug-catch.html' },
  { n:'15b', theme:'t15b', emoji:'🐌', title:'Snail Race',       range:'14 – 19', href:'games/15b-snail-race.html' },
  { n:16, theme:'t16', emoji:'🚂', title:'Train Engineer',     range:'15 – 20', href:'games/16-train-engineer.html' },
  { n:'16b', theme:'t16b', emoji:'🚃', title:'Train Sort',      range:'15 – 20', href:'games/16b-train-sort.html' },
  { n:17, theme:'t17', emoji:'🎪', title:'Carnival Tickets',   range:'0 – 20',  href:'games/17-carnival-tickets.html' },
  { n:18, theme:'t18', emoji:'🐒', title:'Jungle Coconut',     range:'0 – 20',  href:'games/18-jungle-coconut.html' },
  { n:19, theme:'t19', emoji:'🏖️', title:'Sandcastle',         range:'0 – 20',  href:'games/19-beach-sandcastle.html' },
  { n:20, theme:'t20', emoji:'🎩', title:'What Comes Next?',    range:'0 – 20',  href:'games/20-magic-show.html' }
];

let progress = {};
try { progress = JSON.parse(localStorage.getItem('c2t_progress') || '{}'); } catch(e){}

const list = document.getElementById('list');
GAMES.forEach((g, i) => {
  const a = document.createElement('a');
  a.className = 'card ' + g.theme;
  a.href = g.href;
  const completed = !!(progress['c2t/' + g.href.split('/').pop().replace('.html','')] || {}).completed;
  a.innerHTML = `
    <div class="card-header">
      <span class="card-emoji">${g.emoji}</span>
      <div class="card-info">
        <div class="card-title">${g.title}</div>
        <div class="card-range">${g.range}</div>
      </div>
    </div>
    <div class="card-body">
      <span class="card-game-no">Game ${g.n}</span>
      <span class="card-star">${completed ? '⭐' : ''}</span>
      <span class="card-arrow">›</span>
    </div>`;
  list.appendChild(a);
});

// Floating sparkles
(function(){
  const sparkles = ['✨','⭐','💫','🌟'];
  for(let i = 0; i < 14; i++){
    const s = document.createElement('div');
    s.className = 'bg-sparkle';
    s.textContent = sparkles[Math.floor(Math.random()*sparkles.length)];
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.setProperty('--dur', (3 + Math.random()*4) + 's');
    s.style.setProperty('--delay', (-Math.random()*5) + 's');
    s.style.fontSize = (14 + Math.random()*16) + 'px';
    document.body.appendChild(s);
  }
})();

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
