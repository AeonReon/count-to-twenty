<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0ea5e9">
<title>Balloon Race · aha!</title>
<link rel="stylesheet" href="../js/engine.css">
<style>
html, body{
  background: linear-gradient(180deg, #dbeafe 0%, #bae6fd 40%, #fde68a 70%, #86efac 100%);
  color: #1e3a8a;
}
.back-home-btn{ color:#1e3a8a; border-color:#fbbf24; }

.cloud{
  position: absolute; pointer-events: none; opacity: 0.7;
  font-size: clamp(30px, 7vw, 50px);
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift{ from{ transform: translateX(-150px) } to { transform: translateX(110vw) } }

.finish-line{
  position: absolute; top: 9vh; left: 0; right: 0;
  text-align: center;
  font-size: clamp(28px, 7vw, 44px);
  z-index: 3; pointer-events: none;
  animation: heroFloat 2s ease-in-out infinite;
}

/* two lanes going UP — balloons start at bottom of lane, rise as kid taps */
.lanes{
  position: absolute; top: 17vh; left: 0; right: 0; bottom: 26vh;
  display: flex; justify-content: center;
  gap: clamp(30px, 8vw, 60px);
  z-index: 2;
}
.lane{
  position: relative;
  width: clamp(80px, 18vw, 120px);
  background: repeating-linear-gradient(180deg, rgba(255,255,255,0.18) 0 12px, transparent 12px 24px);
  border-left: 3px dashed rgba(30,58,138,0.25);
  border-right: 3px dashed rgba(30,58,138,0.25);
}
.lane-label{
  position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
  background: #fff; color:#1e3a8a;
  border: 3px solid #1e3a8a; border-radius: 10px;
  padding: 2px 8px;
  font-size: clamp(20px, 5vw, 30px); font-weight: 900;
  z-index: 5;
}
.balloon-race{
  position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: clamp(70px, 16vw, 100px);
  height: clamp(100px, 22vw, 140px);
  display: flex; flex-direction: column; align-items: center;
  transition: bottom 0.4s cubic-bezier(0.34,1.56,0.64,1);
  animation: balloonBob 1.2s ease-in-out infinite;
  z-index: 4;
}
@keyframes balloonBob{ 0%,100%{ transform: translateX(-50%) translateY(0) rotate(-3deg) } 50%{ transform: translateX(-50%) translateY(-4px) rotate(3deg) } }
.balloon-race.boost{ animation: boost 0.3s ease-out; }
@keyframes boost{ 0%,100%{ transform: translateX(-50%) scale(1) } 50%{ transform: translateX(-50%) scale(1.12) } }
.balloon-body{
  width: 100%; height: 70%;
  background: radial-gradient(circle at 30% 25%, var(--c1), var(--c2));
  border: 3px solid #fff;
  border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(28px, 7vw, 42px); color:#fff;
  -webkit-text-stroke: 2px rgba(0,0,0,0.45);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  font-weight: 900;
}
.balloon-basket{
  width: 35%; height: 14%;
  background: linear-gradient(180deg, #92400e, #78350f);
  border: 2px solid #422006;
  border-radius: 4px 4px 8px 8px;
}
.bb1{ --c1:#fca5a5; --c2:#dc2626; }
.bb2{ --c1:#fde047; --c2:#d97706; }
.bb3{ --c1:#86efac; --c2:#16a34a; }
.bb4{ --c1:#93c5fd; --c2:#2563eb; }
.bb5{ --c1:#fbcfe8; --c2:#db2777; }
.bb6{ --c1:#c4b5fd; --c2:#7c3aed; }

.tap-zone{
  position: fixed; bottom: 2vh; left: 50%;
  transform: translateX(-50%); z-index: 7;
  width: clamp(220px, 56vw, 380px);
  height: clamp(110px, 22vw, 150px);
  background: linear-gradient(180deg, #fef3c7 0%, #fde047 100%);
  border: 5px solid #1e3a8a;
  border-radius: 22px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; touch-action: manipulation;
  box-shadow: 0 8px 18px rgba(0,0,0,0.3), inset 0 -6px 10px rgba(0,0,0,0.15);
  transition: transform 0.08s var(--bounce);
}
.tap-zone:active{ transform: translateX(-50%) scale(0.95); }
.tap-zone-label{
  font-size: 12px; font-weight: 900; color:#1e3a8a;
  letter-spacing: 1px; margin-bottom: 4px;
}
.tap-zone-target{
  font-size: clamp(46px, 12vw, 68px);
  color:#dc2626;
  -webkit-text-stroke: 3px #1e3a8a;
  text-shadow: 3px 4px 0 #1e3a8a;
  font-weight: 900; line-height: 1;
}

.progress-pill{
  position: fixed; top: max(74px, env(safe-area-inset-top, 12px) + 70px);
  left: 50%; transform: translateX(-50%); z-index: 7;
  background: rgba(255,255,255,0.95);
  border: 3px solid #1e3a8a; border-radius: 18px;
  padding: 6px 12px;
  font-size: 13px; font-weight: 900; color:#1e3a8a;
}

.celeb-big{ -webkit-text-stroke:3px #1e3a8a; text-shadow:4px 6px 0 #fbbf24; }
.celeb-count{ color:#1e3a8a; text-shadow:2px 2px 0 #fff; }
</style>
</head>
<body>

<a href="../index.html" class="back-home-btn">← Home</a>

<div id="scrTitle" class="screen active">
  <div class="title-wrap">
    <div class="title-big">BALLOON RACE</div>
    <div class="title-hero">🎈</div>
    <div class="title-sub">Tap fast · Make your balloon win!</div>
    <button class="start-btn" id="btnStart">🎈 Start Racing</button>
  </div>
</div>

<div id="scrGame" class="screen">
  <div class="hud">
    <span class="hud-prompt">Cheer for</span>
    <span class="hud-target" id="hudTarget">12</span>
  </div>
  <div class="hud-round" id="hudRound">1/4</div>

  <div class="finish-line">🏁 FINISH 🏁</div>

  <div class="lanes">
    <div class="lane">
      <span class="lane-label" id="labelL">9</span>
      <div class="balloon-race bb1" id="balloonL">
        <div class="balloon-body" id="numL">9</div>
        <div class="balloon-basket"></div>
      </div>
    </div>
    <div class="lane">
      <span class="lane-label" id="labelR">14</span>
      <div class="balloon-race bb4" id="balloonR">
        <div class="balloon-body" id="numR">14</div>
        <div class="balloon-basket"></div>
      </div>
    </div>
  </div>

  <div class="progress-pill">🏆 wins: <span id="wins">0</span> / 4</div>

  <div class="tap-zone" id="tapZone">
    <div class="tap-zone-label">TAP FOR BALLOON</div>
    <div class="tap-zone-target" id="tapTarget">12</div>
  </div>

  <div class="banner" id="banner">Round 1</div>
</div>

<div id="scrCeleb" class="screen">
  <div class="celeb-wrap">
    <div class="celeb-big">SKY CHAMPION!</div>
    <div class="title-hero">🎈</div>
    <div class="celeb-count" id="celebCount">All races won!</div>
    <button class="start-btn" id="btnAgain">🎈 Play Again</button>
  </div>
</div>

<canvas id="fxCanvas" style="position:fixed;inset:0;z-index:150;pointer-events:none"></canvas>

<script src="../js/engine.js"></script>
<script>
const audio = new GameAudio({ base: '../audio/' });
const NUMS = [9,10,11,12,13,14];

const STEPS_TO_WIN = 10;
let roundIdx = 0, wins = 0;
let leftNum = 9, rightNum = 14;
let leftSteps = 0, rightSteps = 0;
let target = 9;
let raceActive = false;
let opponentTimer = null;

function pickPair(){
  const s = shuffle(NUMS);
  return [s[0], s[1]];
}

function setupRace(){
  const [a, b] = pickPair();
  leftNum = a; rightNum = b;
  target = Math.random() < 0.5 ? a : b;
  leftSteps = 0; rightSteps = 0;
  $('labelL').textContent = a;
  $('labelR').textContent = b;
  $('numL').textContent = a;
  $('numR').textContent = b;
  $('balloonL').style.bottom = '0';
  $('balloonR').style.bottom = '0';
  $('tapTarget').textContent = target;
  $('hudTarget').textContent = target;
}

function moveBalloon(which, steps){
  const el = which === 'L' ? $('balloonL') : $('balloonR');
  el.style.bottom = ((steps / STEPS_TO_WIN) * 90) + '%';
  el.classList.add('boost');
  setTimeout(() => el.classList.remove('boost'), 280);
}

function handleTap(){
  if(!raceActive) return;
  audio.tone('pop');
  if(target === leftNum){
    leftSteps++;
    moveBalloon('L', leftSteps);
    if(leftSteps >= STEPS_TO_WIN) finishRace('L');
  } else {
    rightSteps++;
    moveBalloon('R', rightSteps);
    if(rightSteps >= STEPS_TO_WIN) finishRace('R');
  }
}

function tickOpponent(){
  if(!raceActive) return;
  if(target === leftNum){
    rightSteps++;
    moveBalloon('R', rightSteps);
    if(rightSteps >= STEPS_TO_WIN) finishRace('R');
  } else {
    leftSteps++;
    moveBalloon('L', leftSteps);
    if(leftSteps >= STEPS_TO_WIN) finishRace('L');
  }
}

function finishRace(winner){
  if(!raceActive) return;
  raceActive = false;
  clearInterval(opponentTimer);
  const playerSide = target === leftNum ? 'L' : 'R';
  const playerWon = winner === playerSide;
  if(playerWon){
    wins++;
    $('wins').textContent = wins;
    audio.clearQueue();
    audio.speakCategory('correct');
    const winBalloon = winner === 'L' ? $('balloonL') : $('balloonR');
    const r = winBalloon.getBoundingClientRect();
    starBurst(r.left + r.width/2, r.top + r.height/2);
    burstConfetti(r.left + r.width/2, r.top + r.height/2, 24);
  } else {
    audio.clearQueue();
    audio.speakPhrase('lets_play');
  }
  audio.tone('ding');
  setTimeout(() => audio.speakNumber(target), 700);
  roundIdx++;
  if(roundIdx >= 4){
    setTimeout(showCeleb, 1500);
  } else {
    setTimeout(startNewRace, 1700);
  }
}

function startNewRace(){
  setupRace();
  $('hudRound').textContent = (roundIdx+1) + '/4';
  showBanner('Race ' + (roundIdx+1), 'Cheer for ' + target);
  setTimeout(() => {
    audio.clearQueue();
    audio.speakPhrase('lets_go');
    setTimeout(() => audio.speakNumber(target), 700);
    raceActive = true;
    opponentTimer = setInterval(tickOpponent, 1100);
  }, 1300);
}

function showCeleb(){
  raceActive = false;
  clearInterval(opponentTimer);
  showScreen('scrCeleb');
  $('celebCount').textContent = `${wins} race${wins === 1 ? '' : 's'} won!`;
  audio.clearQueue();
  audio.speakCategory('game-complete');
  setTimeout(() => { for(let i=0;i<5;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 30); }, 100);
  setTimeout(() => { for(let i=0;i<4;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 25); }, 600);
}

function startGame(){
  roundIdx = 0; wins = 0;
  $('wins').textContent = '0';
  showScreen('scrGame');
  audio.startMusic();
  audio.speakCategory('greetings');
  setTimeout(startNewRace, 1400);
}

(function(){
  for(let i = 0; i < 4; i++){
    const c = document.createElement('div');
    c.className = 'cloud';
    c.textContent = pick(['☁️','⛅']);
    c.style.top = (8 + Math.random()*22) + 'vh';
    c.style.animationDuration = (40 + Math.random()*30) + 's';
    c.style.animationDelay = (-Math.random()*60) + 's';
    document.body.appendChild(c);
  }
})();

initFx();
onTap($('btnStart'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
onTap($('btnAgain'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
onTap($('tapZone'), () => handleTap());
</script>
</body>
</html>
