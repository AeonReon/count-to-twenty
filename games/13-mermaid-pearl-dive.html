<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e7490">
<title>Shark Escape · aha!</title>
<link rel="stylesheet" href="../js/engine.css">
<style>
html, body{
  background: linear-gradient(180deg, #67e8f9 0%, #22d3ee 25%, #0891b2 60%, #134e4a 100%);
  color: #ecfeff;
}
.back-home-btn{ color:#134e4a; border-color:#fde047; background:#ecfeff; }

.bubble{
  position: absolute; pointer-events: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.15));
  animation: bubbleRise var(--dur,7s) linear infinite var(--delay,0s);
}
@keyframes bubbleRise{
  0%{ transform: translateY(0) scale(0.6); opacity: 0; }
  10%{ opacity: 0.8; }
  100%{ transform: translateY(-110vh) scale(1.1); opacity: 0; }
}

/* The "race track" — mermaid goes left → right toward coral reef */
.track-area{
  position: absolute; top: 18vh; left: 0; right: 0; height: 36vh; z-index: 3;
}
.track-line{
  position: absolute; top: 50%; left: 6vw; right: 6vw;
  height: 2px;
  background: repeating-linear-gradient(90deg, rgba(255,255,255,0.4) 0 10px, transparent 10px 20px);
  pointer-events: none;
}
.reef{
  position: absolute; top: 25%; right: 1vw;
  font-size: clamp(60px, 14vw, 100px);
  filter: drop-shadow(0 0 18px #fde047);
  animation: reefGlow 2.4s ease-in-out infinite;
  pointer-events: none;
  z-index: 2;
}
@keyframes reefGlow{ 0%,100%{ filter: drop-shadow(0 0 14px #fde047); transform: scale(1) } 50%{ filter: drop-shadow(0 0 26px #fde047); transform: scale(1.05) } }

/* mermaid swims left-to-right as you tap correct shells */
.mermaid{
  position: absolute; top: 38%;
  left: 8%;
  font-size: clamp(60px, 14vw, 100px);
  z-index: 5;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.4));
  transition: left 0.7s cubic-bezier(0.34,1.56,0.64,1);
  animation: mermaidSwim 1.8s ease-in-out infinite;
}
@keyframes mermaidSwim{ 0%,100%{ transform: translateY(-4px) rotate(-5deg) } 50%{ transform: translateY(4px) rotate(5deg) } }
.mermaid.swim-fwd{ animation: swimFwd 0.7s var(--bounce); }
@keyframes swimFwd{ 0%{ transform: translateY(0) rotate(0) scale(1); } 50%{ transform: translateY(-12px) rotate(-12deg) scale(1.1); } 100%{ transform: translateY(0) rotate(0) scale(1); } }

/* shark chases from behind — closes the gap on a slow timer */
.shark{
  position: absolute; top: 42%;
  right: 75%;
  font-size: clamp(70px, 16vw, 110px);
  z-index: 4;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));
  transition: right 0.8s cubic-bezier(0.45,0.05,0.55,0.95);
  animation: sharkSwim 1.4s ease-in-out infinite;
  transform-origin: center;
}
@keyframes sharkSwim{ 0%,100%{ transform: scaleX(-1) translateY(-2px) rotate(-3deg) } 50%{ transform: scaleX(-1) translateY(2px) rotate(3deg) } }
.shark.snap{ animation: sharkSnap 0.5s ease-in-out; }
@keyframes sharkSnap{ 0%,100%{ transform: scaleX(-1) scale(1) } 50%{ transform: scaleX(-1) scale(1.15) rotate(-8deg) } }
.shark.flee{ animation: sharkFlee 0.6s var(--bounce); }
@keyframes sharkFlee{ 0%{ transform: scaleX(-1) scale(1); } 50%{ transform: scaleX(-1) scale(0.85) rotate(15deg); } 100%{ transform: scaleX(-1) scale(1); } }

/* danger flash when shark is too close */
.danger-flash{
  position: fixed; inset: 0; pointer-events: none; z-index: 49;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(220,38,38,0.25) 100%);
  opacity: 0; transition: opacity 0.4s;
}
.danger-flash.on{ opacity: 1; animation: dangerPulse 0.8s ease-in-out infinite; }
@keyframes dangerPulse{ 0%,100%{ opacity: 0.4 } 50%{ opacity: 0.9 } }

/* progress meter — visualises how close mermaid is to safety */
.escape-meter{
  position: fixed; top: max(74px, env(safe-area-inset-top, 12px) + 70px);
  left: 50%; transform: translateX(-50%); z-index: 7;
  width: clamp(180px, 50vw, 280px);
  background: rgba(255,255,255,0.95);
  border: 3px solid #134e4a; border-radius: 999px;
  padding: 4px;
  display: flex; align-items: center;
}
.escape-meter-bar{
  flex: 1; height: 14px;
  background: rgba(15,118,110,0.2);
  border-radius: 999px;
  overflow: hidden;
}
.escape-meter-fill{
  height: 100%;
  background: linear-gradient(90deg, #fde047 0%, #f59e0b 100%);
  border-radius: 999px;
  width: 0%;
  transition: width 0.6s var(--bounce);
}
.escape-meter-label{
  font-size: 10px; font-weight: 900; color:#134e4a;
  margin-left: 8px; white-space: nowrap;
}

/* shells along the ocean floor — six numbered shells the kid chooses from */
.shell-row-label{
  position: fixed;
  bottom: calc(2vh + clamp(80px, 18vw, 130px));
  left: 50%; transform: translateX(-50%); z-index: 7;
  background: rgba(254,240,138,0.95);
  border: 3px solid #134e4a; border-radius: 14px;
  padding: 4px 12px;
  font-size: 12px; font-weight: 900; color:#134e4a;
  letter-spacing: 1px;
}
.shell-row{
  position: fixed; bottom: 2vh; left: 0; right: 0;
  z-index: 6;
  display: flex; justify-content: center; align-items: flex-end;
  gap: clamp(6px, 2vw, 14px);
  padding: 0 clamp(8px, 3vw, 18px);
}
.shell{
  position: relative;
  width: clamp(72px, 16vw, 110px);
  aspect-ratio: 1;
  cursor: pointer; touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s var(--bounce);
}
.shell:active{ transform: scale(0.92); }
.shell-disc{
  position: relative;
  width: 100%; height: 100%;
  background: radial-gradient(circle at 35% 30%, #fef2f2 0%, #fbcfe8 40%, #ec4899 100%);
  border: 4px solid #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 18px rgba(0,0,0,0.4),
              inset -8px -10px 14px rgba(0,0,0,0.2),
              0 0 18px rgba(252,211,77,0.3);
}
.shell-disc::after{
  content: '';
  position: absolute; inset: 8% 8% 50% 8%;
  background:
    repeating-linear-gradient(110deg, transparent 0 7px, rgba(255,255,255,0.4) 7px 9px);
  border-radius: 50% 50% 10% 10% / 50% 50% 20% 20%;
  opacity: 0.7;
}
.shell-num{
  position: relative; z-index: 3;
  font-size: clamp(30px, 7.5vw, 48px); color:#fff;
  -webkit-text-stroke: 2.5px rgba(0,0,0,0.5);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  font-weight: 900;
}
.shell.wobble{ animation: wobble 0.5s ease-in-out; }
.shell.used{ pointer-events: none; opacity: 0.85; }

.celeb-big{ -webkit-text-stroke:3px #134e4a; text-shadow:4px 6px 0 #fde047; }
.celeb-count{ color:#ecfeff; text-shadow:2px 2px 0 #134e4a; }
</style>
</head>
<body>

<a href="../index.html" class="back-home-btn">← Home</a>

<div id="scrTitle" class="screen active">
  <div class="title-wrap">
    <div class="title-big">SHARK ESCAPE</div>
    <div class="title-hero">🧜‍♀️</div>
    <div class="title-sub">Help mermaid reach the reef before the shark catches her!</div>
    <button class="start-btn" id="btnStart">🧜‍♀️ Quick! Swim!</button>
  </div>
</div>

<div id="scrGame" class="screen">
  <div class="hud">
    <span class="hud-prompt">Tap shell</span>
    <span class="hud-target" id="hudTarget">15</span>
  </div>
  <div class="hud-round" id="hudRound">1/4</div>

  <div class="track-area">
    <div class="track-line"></div>
    <div class="reef">🪸</div>
    <span class="shark" id="shark">🦈</span>
    <span class="mermaid" id="mermaid">🧜‍♀️</span>
  </div>

  <div class="escape-meter">
    <div class="escape-meter-bar"><div class="escape-meter-fill" id="meter"></div></div>
    <div class="escape-meter-label" id="meterLabel">SWIM!</div>
  </div>

  <div class="shell-row-label">PICK A SHELL</div>
  <div class="shell-row" id="shells"></div>

  <div class="danger-flash" id="dangerFlash"></div>

  <div class="banner" id="banner">Round 1</div>
</div>

<div id="scrCeleb" class="screen">
  <div class="celeb-wrap">
    <div class="celeb-big">SAFE AT THE REEF!</div>
    <div class="title-hero">🧜‍♀️</div>
    <div class="celeb-count" id="celebCount">Mermaid made it!</div>
    <button class="start-btn" id="btnAgain">🧜‍♀️ Play Again</button>
  </div>
</div>

<canvas id="fxCanvas" style="position:fixed;inset:0;z-index:150;pointer-events:none"></canvas>

<script src="../js/engine.js"></script>
<script>
const audio = new GameAudio({ base: '../audio/' });
const NUMS = [12,13,14,15,16,17];

// Mermaid escape state
//   mermaidPct: 8 → 92 over 16 correct taps (88px range)
//   sharkPct (from right): starts at 75% (far behind), creeps up by ~3% per second
//   correct tap → mermaid+5% forward, shark backs up ~6%
//   shark cannot go past 0% — if it gets to mermaidPct - 4, danger flash shows
const TOTAL_STEPS = 16;
let mermaidPct = 8;
let sharkPct   = 75;  // shark distance from RIGHT edge
let sharkTimer = null;
const SHARK_CREEP_PER_SEC = 1.8;   // % per second
const STEP_MERMAID = (92 - 8) / TOTAL_STEPS;
const STEP_PUSHBACK = 7;

let roundIdx = 0, promptIdx = 0, escapeSteps = 0;
let currentTarget = null;
let promptList = [];
let hintTimer = null;
let shellEls = [];
let busy = false;
let lastSharkTick = 0;

function spawnShells(){
  const row = $('shells');
  row.innerHTML = '';
  shellEls = [];
  shuffle(NUMS).forEach(n => {
    const s = document.createElement('div');
    s.className = 'shell';
    s.dataset.n = n;
    s.innerHTML = `<div class="shell-disc"><span class="shell-num">${n}</span></div>`;
    onTap(s, () => handleShellTap(s, n));
    row.appendChild(s);
    shellEls.push(s);
  });
}

function handleShellTap(el, n){
  if(busy) return;
  if(n === currentTarget){
    busy = true;
    el.classList.add('used');
    audio.tone('whoosh');
    audio.clearQueue();
    audio.speakCategory('correct');
    clearTimeout(hintTimer);
    // Mermaid sprints forward, shark falls back
    escapeSteps++;
    mermaidPct = Math.min(92, mermaidPct + STEP_MERMAID);
    sharkPct = Math.min(85, sharkPct + STEP_PUSHBACK);
    $('mermaid').style.left = mermaidPct + '%';
    $('shark').style.right = sharkPct + '%';
    $('mermaid').classList.add('swim-fwd');
    $('shark').classList.add('flee');
    setTimeout(() => $('mermaid').classList.remove('swim-fwd'), 700);
    setTimeout(() => $('shark').classList.remove('flee'), 600);
    updateMeter();
    const mR = $('mermaid').getBoundingClientRect();
    starBurst(mR.left + mR.width/2, mR.top + mR.height/2);
    burstConfetti(mR.left + mR.width/2, mR.top + mR.height/2, 10);
    promptIdx++;
    setTimeout(() => {
      busy = false;
      if(escapeSteps >= TOTAL_STEPS) finishEscape();
      else nextPrompt();
    }, 700);
  } else {
    el.classList.add('wobble');
    audio.tone('wrong');
    audio.clearQueue();
    audio.speakCategory('wrong');
    setTimeout(() => el.classList.remove('wobble'), 600);
    setTimeout(() => {
      audio.speakPhrase('which_number');
      audio.speakNumber(currentTarget);
    }, 1100);
  }
}

function updateMeter(){
  // % toward safety (the reef at the right end)
  const pct = (escapeSteps / TOTAL_STEPS) * 100;
  $('meter').style.width = pct + '%';
  $('meterLabel').textContent = pct >= 100 ? 'SAFE!' : 'SWIM! ' + Math.round(pct) + '%';
}

function tickShark(){
  // Slowly close the gap regardless of taps. Cap so it never quite catches mermaid.
  const now = performance.now();
  const dt = lastSharkTick ? (now - lastSharkTick) / 1000 : 0.5;
  lastSharkTick = now;
  sharkPct = Math.max(0, sharkPct - SHARK_CREEP_PER_SEC * dt);
  $('shark').style.right = sharkPct + '%';
  // Convert to "distance from mermaid" — mermaidPct is from LEFT, sharkPct from RIGHT.
  // Shark's left edge in % from left = 100 - sharkPct.
  const sharkLeftPct = 100 - sharkPct;
  const gap = sharkLeftPct - mermaidPct;
  const inDanger = gap < 12;  // shark within ~12% of mermaid
  $('dangerFlash').classList.toggle('on', inDanger);
  if(inDanger){
    $('shark').classList.add('snap');
    setTimeout(() => $('shark').classList.remove('snap'), 500);
  }
  // If shark "catches" mermaid (gap < 0), gently teleport it back — no fail state
  if(gap < -2){
    sharkPct = 100 - mermaidPct - 18;  // bump back
    $('shark').style.right = sharkPct + '%';
    audio.tone('whoosh');
  }
}

function nextPrompt(){
  if(promptIdx >= 4){
    finishRound();
    return;
  }
  currentTarget = promptList[promptIdx];
  $('hudTarget').textContent = currentTarget;
  spawnShells();
  setTimeout(() => {
    audio.clearQueue();
    audio.speakPhrase('tap_the_number');
    audio.speakNumber(currentTarget);
  }, 250);
  scheduleHint();
}

function scheduleHint(){
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => {
    shellEls.forEach(s => {
      if(Number(s.dataset.n) === currentTarget && !s.classList.contains('used')){
        s.animate(
          [{filter:'brightness(1)'},{filter:'brightness(1.55) drop-shadow(0 0 18px #fde047)'},{filter:'brightness(1)'}],
          {duration:700, iterations:2}
        );
      }
    });
    audio.clearQueue();
    audio.speakNumber(currentTarget);
    scheduleHint();
  }, 6500);
}

function startRound(){
  promptIdx = 0;
  $('hudRound').textContent = (roundIdx+1) + '/4';
  promptList = shuffle(NUMS).slice(0, 4);
  showBanner('Round ' + (roundIdx+1));
  setTimeout(nextPrompt, 1300);
}

function finishRound(){
  clearTimeout(hintTimer);
  roundIdx++;
  audio.clearQueue();
  audio.speakCategory('round-complete');
  if(roundIdx >= 4){
    setTimeout(finishEscape, 700);
  } else {
    setTimeout(startRound, 1500);
  }
}

function finishEscape(){
  // Mermaid reaches the reef, shark waves and swims away
  clearInterval(sharkTimer);
  $('dangerFlash').classList.remove('on');
  $('mermaid').style.left = '92%';
  $('shark').style.right = '110%';
  audio.tone('sparkle');
  for(let i = 0; i < 5; i++){
    setTimeout(() => burstConfetti(Math.random()*innerWidth, innerHeight*0.4, 28), i*220);
  }
  setTimeout(showCeleb, 1800);
}

function showCeleb(){
  showScreen('scrCeleb');
  $('celebCount').textContent = `Mermaid escaped in ${escapeSteps} swims!`;
  audio.clearQueue();
  audio.speakCategory('game-complete');
  setTimeout(() => { for(let i=0;i<5;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 30); }, 100);
  setTimeout(() => { for(let i=0;i<4;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 25); }, 600);
}

function startGame(){
  roundIdx = 0; escapeSteps = 0;
  mermaidPct = 8; sharkPct = 75;
  $('mermaid').style.left = mermaidPct + '%';
  $('shark').style.right = sharkPct + '%';
  $('dangerFlash').classList.remove('on');
  updateMeter();
  showScreen('scrGame');
  audio.startMusic();
  audio.speakCategory('greetings');
  setTimeout(startRound, 1400);
  // start shark creep
  lastSharkTick = 0;
  if(sharkTimer) clearInterval(sharkTimer);
  sharkTimer = setInterval(tickShark, 250);
}

// bubble background
(function(){
  setInterval(() => {
    if(!$('scrGame').classList.contains('active')) return;
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.left = (Math.random()*100) + 'vw';
    b.style.bottom = '0';
    b.style.setProperty('--dur', (5 + Math.random()*4) + 's');
    b.style.width = (8 + Math.random()*16) + 'px';
    b.style.height = b.style.width;
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 9500);
  }, 700);
})();

initFx();
onTap($('btnStart'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
onTap($('btnAgain'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
</script>
</body>
</html>
