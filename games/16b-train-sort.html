<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#b91c1c">
<title>Train Sort · aha!</title>
<link rel="stylesheet" href="../js/engine.css">
<style>
html, body{
  background: linear-gradient(180deg, #fef3c7 0%, #fde68a 30%, #fda4af 70%, #be123c 100%);
  color: #7f1d1d;
}
.back-home-btn{ color:#7f1d1d; border-color:#fde047; }

.cloud{ position: absolute; pointer-events: none; opacity: 0.7; font-size: clamp(34px, 8vw, 56px); animation: cloudDrift linear infinite; }
@keyframes cloudDrift{ from{ transform: translateX(-150px) } to { transform: translateX(110vw) } }

.station-sign{
  position: absolute; top: 12vh; left: 50%;
  transform: translateX(-50%); z-index: 5;
  background: #fff; color: #7f1d1d;
  border: 4px solid #7f1d1d; border-radius: 14px;
  padding: 8px 18px;
  font-size: clamp(14px, 3.5vw, 20px); font-weight: 900; letter-spacing: 2px;
  box-shadow: 0 5px 12px rgba(0,0,0,0.25);
}
.conductor{
  position: absolute; top: 18vh; left: 50%;
  transform: translateX(-50%);
  font-size: clamp(50px, 12vw, 80px); z-index: 5;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
  animation: heroFloat 2.4s ease-in-out infinite;
}
.conductor.cheer{ animation: cheer 0.7s var(--bounce); }
@keyframes cheer{ 0%{transform:translateX(-50%) scale(1)} 30%{transform:translateX(-50%) scale(1.2) rotate(-10deg)} 60%{transform:translateX(-50%) scale(1.1) rotate(10deg)} 100%{transform:translateX(-50%) scale(1)} }

.track{
  position: absolute; bottom: 32vh; left: 0; right: 0;
  height: 16px; z-index: 2;
  background: repeating-linear-gradient(90deg, #422006 0 12px, transparent 12px 22px),
              linear-gradient(180deg, #78350f, #422006);
  border-top: 4px solid #fbbf24;
  border-bottom: 4px solid #422006;
}

.train-track{
  position: absolute; bottom: calc(32vh + 14px); left: 4vw; right: 4vw;
  z-index: 4; pointer-events: none;
  display: flex; align-items: flex-end; gap: 4px;
  flex-wrap: nowrap; min-height: clamp(70px, 16vw, 100px);
}
.engine{
  width: clamp(80px, 18vw, 110px);
  height: clamp(70px, 16vw, 95px);
  background: linear-gradient(180deg, #dc2626, #991b1b);
  border: 4px solid #422006; border-radius: 14px 4px 6px 6px;
  position: relative;
  box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}
.engine::before{
  content:''; position: absolute; top: -14px; left: 30%;
  width: 16px; height: 18px;
  background: linear-gradient(180deg, #1f2937, #111827);
  border: 3px solid #422006; border-radius: 4px 4px 2px 2px;
}
.engine::after{ content:'🚂'; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); font-size: clamp(26px, 7vw, 38px); }
.coupled-spot{
  width: clamp(58px, 13vw, 84px);
  height: clamp(54px, 12vw, 76px);
  border: 3px dashed #422006;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(18px, 4.5vw, 26px); color: #422006;
  font-weight: 900;
  background: rgba(255,255,255,0.4);
}
.coupled-spot.filled{
  border: none; background: linear-gradient(180deg, var(--c1), var(--c2));
  color: #fff; -webkit-text-stroke: 1.5px rgba(0,0,0,0.4);
  text-shadow: 1px 2px 0 rgba(0,0,0,0.3);
  animation: filledPop 0.7s var(--bounce);
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}
@keyframes filledPop{ 0%{ transform: scale(0); } 60%{ transform: scale(1.3); } 100%{ transform: scale(1); } }
.tc1{ --c1:#fde047; --c2:#d97706; }
.tc2{ --c1:#86efac; --c2:#16a34a; }
.tc3{ --c1:#93c5fd; --c2:#2563eb; }
.tc4{ --c1:#fbcfe8; --c2:#db2777; }
.tc5{ --c1:#c4b5fd; --c2:#7c3aed; }
.tc6{ --c1:#fca5a5; --c2:#dc2626; }

/* carriage yard at bottom */
.yard-label{
  position: fixed;
  bottom: calc(2vh + clamp(80px, 18vw, 130px));
  left: 50%; transform: translateX(-50%); z-index: 7;
  background: rgba(255,255,255,0.95);
  border: 3px solid #7f1d1d; border-radius: 14px;
  padding: 4px 12px;
  font-size: 12px; font-weight: 900; color:#7f1d1d;
  letter-spacing: 1px;
}
.yard{
  position: fixed; bottom: 2vh; left: 0; right: 0;
  z-index: 6;
  display: flex; justify-content: center; align-items: flex-end;
  gap: clamp(6px, 2vw, 14px);
  padding: 0 clamp(8px, 3vw, 18px);
}
.car{
  position: relative;
  width: clamp(70px, 16vw, 100px);
  height: clamp(70px, 16vw, 100px);
  cursor: pointer; touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s var(--bounce);
}
.car:active{ transform: scale(0.92); }
.car-body{
  position: relative;
  width: 100%; height: 100%;
  background: linear-gradient(180deg, var(--c1), var(--c2));
  border: 4px solid #422006; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 12px rgba(0,0,0,0.3);
}
.car-num{
  font-size: clamp(28px, 7vw, 42px); color:#fff;
  -webkit-text-stroke: 2px rgba(0,0,0,0.45);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  font-weight: 900;
}
.car.wobble{ animation: wobble 0.5s ease-in-out; }
.car.lined{ pointer-events: none; opacity: 0.3; }

.next-pill{
  position: fixed; top: max(74px, env(safe-area-inset-top, 12px) + 70px);
  left: 14px; z-index: 7;
  background: rgba(255,255,255,0.95);
  border: 3px solid #7f1d1d; border-radius: 18px;
  padding: 6px 12px;
  font-size: 13px; font-weight: 900; color:#7f1d1d;
}

.celeb-big{ -webkit-text-stroke:3px #7f1d1d; text-shadow:4px 6px 0 #fde047; }
.celeb-count{ color:#7f1d1d; text-shadow:2px 2px 0 #fff; }
</style>
</head>
<body>

<a href="../index.html" class="back-home-btn">← Home</a>

<div id="scrTitle" class="screen active">
  <div class="title-wrap">
    <div class="title-big">TRAIN SORT</div>
    <div class="title-hero">🚂</div>
    <div class="title-sub">Couple the cars in order — smallest first!</div>
    <button class="start-btn" id="btnStart">🚂 All Aboard</button>
  </div>
</div>

<div id="scrGame" class="screen">
  <div class="hud">
    <span class="hud-prompt">Next car</span>
    <span class="hud-target" id="hudTarget">15</span>
  </div>
  <div class="hud-round" id="hudRound">1/4</div>

  <div class="station-sign">SORTING STATION</div>
  <span class="conductor" id="conductor">👷‍♂️</span>
  <div class="track"></div>

  <div class="train-track" id="trainTrack">
    <div class="engine"></div>
  </div>

  <div class="next-pill">🚃 <span id="progress">0</span> / 16</div>
  <div class="yard-label">CARRIAGE YARD</div>
  <div class="yard" id="yard"></div>

  <div class="banner" id="banner">Round 1</div>
</div>

<div id="scrCeleb" class="screen">
  <div class="celeb-wrap">
    <div class="celeb-big">ALL SORTED!</div>
    <div class="title-hero">🚂</div>
    <div class="celeb-count" id="celebCount">All trains assembled!</div>
    <button class="start-btn" id="btnAgain">🚂 Play Again</button>
  </div>
</div>

<canvas id="fxCanvas" style="position:fixed;inset:0;z-index:150;pointer-events:none"></canvas>

<script src="../js/engine.js"></script>
<script>
const audio = new GameAudio({ base: '../audio/' });
const NUMS = [15,16,17,18,19,20];
const COLORS = ['tc1','tc2','tc3','tc4','tc5','tc6'];

let roundIdx = 0, totalCoupled = 0, nextIdx = 0;
let currentOrder = [];
let yardEls = [];
let busy = false;

function buildTrackSlots(){
  const track = $('trainTrack');
  // clear all but engine
  [...track.querySelectorAll('.coupled-spot')].forEach(s => s.remove());
  NUMS.forEach(() => {
    const s = document.createElement('div');
    s.className = 'coupled-spot';
    s.textContent = '?';
    track.appendChild(s);
  });
}

function spawnYard(){
  const yard = $('yard');
  yard.innerHTML = '';
  yardEls = [];
  const colors = shuffle(COLORS);
  shuffle(NUMS).forEach((n, i) => {
    const c = document.createElement('div');
    c.className = 'car';
    c.dataset.n = n;
    c.dataset.color = colors[i % colors.length];
    c.innerHTML = `<div class="car-body ${colors[i % colors.length]}"><span class="car-num">${n}</span></div>`;
    onTap(c, () => handleCarTap(c, n));
    yard.appendChild(c);
    yardEls.push(c);
  });
}

function handleCarTap(el, n){
  if(busy || el.classList.contains('lined')) return;
  const want = currentOrder[nextIdx];
  if(n === want){
    busy = true;
    el.classList.add('lined');
    audio.tone('ding');
    audio.clearQueue();
    audio.speakCategory('correct');
    // fill the next slot in the train track
    const slots = $('trainTrack').querySelectorAll('.coupled-spot');
    const slot = slots[nextIdx];
    slot.className = 'coupled-spot filled ' + el.dataset.color;
    slot.textContent = n;
    $('conductor').classList.add('cheer');
    setTimeout(() => $('conductor').classList.remove('cheer'), 700);
    const r = slot.getBoundingClientRect();
    starBurst(r.left + r.width/2, r.top + r.height/2);
    nextIdx++;
    totalCoupled++;
    $('progress').textContent = totalCoupled;
    if(nextIdx >= currentOrder.length){
      audio.tone('blast');
      burstConfetti(innerWidth/2, innerHeight*0.4, 26);
      setTimeout(() => { busy = false; finishRound(); }, 900);
    } else {
      const next = currentOrder[nextIdx];
      $('hudTarget').textContent = next;
      setTimeout(() => {
        audio.clearQueue();
        audio.speakNumber(next);
        busy = false;
      }, 800);
    }
  } else {
    el.classList.add('wobble');
    audio.tone('wrong');
    audio.clearQueue();
    audio.speakCategory('wrong');
    setTimeout(() => el.classList.remove('wobble'), 600);
    setTimeout(() => {
      audio.speakPhrase('tap_the_number');
      audio.speakNumber(want);
    }, 1100);
  }
}

function startRound(){
  $('hudRound').textContent = (roundIdx+1) + '/4';
  currentOrder = NUMS.slice().sort((a, b) => a - b);
  nextIdx = 0;
  $('hudTarget').textContent = currentOrder[0];
  buildTrackSlots();
  spawnYard();
  showBanner('Round ' + (roundIdx+1), 'Smallest first!');
  setTimeout(() => {
    audio.clearQueue();
    audio.speakPhrase('tap_the_number');
    audio.speakNumber(currentOrder[0]);
  }, 1300);
}

function finishRound(){
  roundIdx++;
  audio.clearQueue();
  audio.speakCategory('round-complete');
  if(roundIdx >= 4){
    setTimeout(showCeleb, 1100);
  } else {
    setTimeout(startRound, 1500);
  }
}

function showCeleb(){
  showScreen('scrCeleb');
  $('celebCount').textContent = `${totalCoupled} cars sorted!`;
  audio.clearQueue();
  audio.speakCategory('game-complete');
  setTimeout(() => { for(let i=0;i<5;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 30); }, 100);
  setTimeout(() => { for(let i=0;i<4;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 25); }, 600);
}

function startGame(){
  roundIdx = 0; totalCoupled = 0;
  $('progress').textContent = '0';
  showScreen('scrGame');
  audio.startMusic();
  audio.speakCategory('greetings');
  setTimeout(startRound, 1400);
}

(function(){
  for(let i = 0; i < 4; i++){
    const c = document.createElement('div');
    c.className = 'cloud'; c.textContent = pick(['☁️','⛅']);
    c.style.top = (4 + Math.random()*20) + 'vh';
    c.style.animationDuration = (40 + Math.random()*30) + 's';
    c.style.animationDelay = (-Math.random()*60) + 's';
    document.body.appendChild(c);
  }
})();

initFx();
onTap($('btnStart'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
onTap($('btnAgain'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
</script>
</body>
</html>
