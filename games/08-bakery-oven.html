<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#d97706">
<title>Bakery Oven · aha!</title>
<link rel="stylesheet" href="../js/engine.css">
<style>
html, body{
  background: linear-gradient(180deg, #fef3c7 0%, #fed7aa 35%, #fdba74 75%, #ea580c 100%);
  color: #7c2d12;
}
.back-home-btn{ color:#7c2d12; border-color:#fbbf24; }
.home-bubble{ border-color:#fbbf24; }

.baker{
  position: absolute; top: 13vh; right: 6vw;
  font-size: clamp(60px, 14vw, 100px);
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.25));
  animation: bakerWave 3s ease-in-out infinite;
  z-index: 5;
}
@keyframes bakerWave{ 0%,100%{ transform: rotate(-3deg) } 50%{ transform: rotate(3deg) } }
.baker.cheer{ animation: bakerCheer 0.7s var(--bounce); }
@keyframes bakerCheer{
  0%   { transform: scale(1) rotate(0); }
  30%  { transform: scale(1.2) rotate(-10deg); }
  60%  { transform: scale(1.1) rotate(10deg); }
  100% { transform: scale(1); }
}

.steam{
  position: absolute; pointer-events: none;
  font-size: clamp(20px, 5vw, 32px); opacity: 0.6;
  animation: steamRise var(--dur, 4s) ease-in infinite var(--delay, 0s);
}
@keyframes steamRise{
  0%   { transform: translateY(0); opacity: 0; }
  20%  { opacity: 0.7; }
  100% { transform: translateY(-180px); opacity: 0; }
}

/* the oven */
.oven{
  position: absolute; top: 19vh; left: 50%;
  transform: translateX(-50%); z-index: 3;
  width: clamp(280px, 80vw, 460px);
  height: clamp(280px, 60vh, 420px);
  background: linear-gradient(180deg, #57534e 0%, #292524 100%);
  border: 6px solid #fbbf24; border-radius: 18px;
  box-shadow: 0 12px 24px rgba(0,0,0,0.4), inset 0 -8px 20px rgba(0,0,0,0.45);
  padding: clamp(18px, 4vw, 28px);
}
.oven::before{
  content:''; position: absolute; top: -20px;
  left: 8%; right: 8%; height: 16px;
  background: #57534e; border: 4px solid #292524;
  border-radius: 8px 8px 0 0;
}
.oven::after{
  content:'BAKERY';
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  font-size: 13px; color: #fbbf24; font-weight: 900; letter-spacing: 2px;
  z-index: 5;
}

.oven-window{
  position: relative;
  background: linear-gradient(180deg, #fef3c7 0%, #fde68a 50%, #fbbf24 100%);
  border: 4px solid #422006; border-radius: 12px;
  width: 100%; height: 100%;
  box-shadow: inset 0 0 30px rgba(217,119,6,0.3);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: clamp(8px, 2vw, 14px);
  padding: clamp(10px, 2.4vw, 18px);
}

.cake{
  position: relative;
  cursor: pointer; touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s var(--bounce);
}
.cake:active{ transform: scale(0.93); }

.cake-body{
  position: relative;
  width: 100%; height: 100%;
  background: linear-gradient(180deg, var(--c1), var(--c2));
  border: 3px solid var(--c-border, #422006);
  border-radius: 50% 50% 18% 18%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 -10px 14px rgba(0,0,0,0.18), 0 4px 10px rgba(0,0,0,0.2);
}
.cake-body::before{
  content:''; position: absolute; top: 18%; left: 50%; transform: translateX(-50%);
  width: 80%; height: 22%;
  background: var(--c-icing, #fff);
  border-radius: 50%;
}
.cake-cherry{
  position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
  font-size: 16px;
}
.cake-num{
  position: relative; z-index: 3;
  font-size: clamp(28px, 7vw, 44px); color:#fff;
  -webkit-text-stroke: 2px rgba(0,0,0,0.45);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.35);
  font-weight: 900;
  margin-top: 12%;
}

/* cake palette */
.ca1{ --c1:#fde2e7; --c2:#f472b6; --c-icing:#fbcfe8; }
.ca2{ --c1:#fef3c7; --c2:#fbbf24; --c-icing:#fde68a; }
.ca3{ --c1:#e0e7ff; --c2:#818cf8; --c-icing:#c7d2fe; }
.ca4{ --c1:#dcfce7; --c2:#4ade80; --c-icing:#bbf7d0; }
.ca5{ --c1:#fed7aa; --c2:#f97316; --c-icing:#ffedd5; }
.ca6{ --c1:#e9d5ff; --c2:#a855f7; --c-icing:#ddd6fe; }

.cake.served{ animation: cakeFly 0.8s var(--bounce) forwards; pointer-events:none; }
@keyframes cakeFly{
  0%  { transform: scale(1) translateY(0); }
  50% { transform: scale(1.2) translateY(-50vh); }
  100%{ transform: scale(0.3) translateY(80vh); opacity: 0; }
}
.cake.wobble{ animation: wobble 0.5s ease-in-out; }

/* display shelf at the bottom */
.shelf{
  position: fixed; bottom: 2vh; left: 50%;
  transform: translateX(-50%); z-index: 6;
  width: clamp(260px, 70vw, 380px);
  background: linear-gradient(180deg, #92400e, #78350f);
  border: 4px solid #422006; border-radius: 10px;
  padding: 10px 14px 6px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.35);
  display: flex; flex-direction: column; align-items: center;
}
.shelf-label{
  color: #fef3c7; font-weight: 900; font-size: 12px;
  letter-spacing: 1px; margin-bottom: 4px;
}
.shelf-row{
  display: flex; gap: 6px; min-height: 28px; align-items: flex-end;
}
.shelf-item{
  font-size: 22px;
  animation: shelfPop 0.6s var(--bounce);
}
@keyframes shelfPop{ 0%{ transform: scale(0) } 60%{ transform: scale(1.3) } 100%{ transform: scale(1) } }

.celeb-big{ -webkit-text-stroke:3px #7c2d12; text-shadow:4px 6px 0 #fbbf24; }
.celeb-count{ color:#7c2d12; text-shadow:2px 2px 0 #fff; }
</style>
</head>
<body>

<a href="../index.html" class="back-home-btn">← Home</a>
<a href="../index.html" class="home-bubble" id="homeBubble" style="display:none">🏠</a>

<div id="scrTitle" class="screen active">
  <div class="title-wrap">
    <div class="title-big">BAKERY OVEN</div>
    <div class="title-hero">🧁</div>
    <div class="title-sub">Take out the right cake!</div>
    <button class="start-btn" id="btnStart">👩‍🍳 Open Shop</button>
  </div>
</div>

<div id="scrGame" class="screen">
  <div class="hud">
    <span class="hud-prompt">Cake</span>
    <span class="hud-target" id="hudTarget">10</span>
  </div>
  <div class="hud-round" id="hudRound">1/4</div>

  <div class="baker" id="baker">👩‍🍳</div>

  <div class="oven">
    <div class="oven-window" id="cakes"></div>
  </div>

  <div class="shelf">
    <div class="shelf-label">DAILY SPECIALS</div>
    <div class="shelf-row" id="shelf"></div>
  </div>

  <div class="banner" id="banner">Round 1</div>
</div>

<div id="scrCeleb" class="screen">
  <div class="celeb-wrap">
    <div class="celeb-big">SOLD OUT!</div>
    <div class="title-hero">🧁</div>
    <div class="celeb-count" id="celebCount">Cakes for everyone!</div>
    <button class="start-btn" id="btnAgain">👩‍🍳 Play Again</button>
  </div>
</div>

<canvas id="fxCanvas" style="position:fixed;inset:0;z-index:150;pointer-events:none"></canvas>

<script src="../js/engine.js"></script>
<script>
const audio = new GameAudio({ base: '../audio/' });
const NUMS = [7,8,9,10,11,12];
const CA_CLASSES = ['ca1','ca2','ca3','ca4','ca5','ca6'];

const ROUNDS = [
  { prompts: 4 },
  { prompts: 4 },
  { prompts: 4 },
  { prompts: 4 }
];

let roundIdx = 0, promptIdx = 0, served = 0;
let currentTarget = null;
let promptList = [];
let hintTimer = null;
let cakeEls = [];

function spawnCakes(){
  const tray = $('cakes');
  tray.innerHTML = '';
  cakeEls = [];
  const ordering = shuffle(NUMS);
  const colors = shuffle(CA_CLASSES);
  ordering.forEach((n, i) => {
    const c = document.createElement('div');
    c.className = 'cake';
    c.dataset.n = n;
    c.innerHTML = `
      <div class="cake-body ${colors[i % colors.length]}">
        <div class="cake-cherry">🍒</div>
        <div class="cake-num">${n}</div>
      </div>`;
    onTap(c, () => handleCakeTap(c, n));
    tray.appendChild(c);
    cakeEls.push(c);
  });
}

function handleCakeTap(el, n){
  if(el.classList.contains('served')) return;
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  if(n === currentTarget){
    el.classList.add('served');
    audio.tone('ding');
    starBurst(cx, cy);
    burstConfetti(cx, cy, 14);
    audio.clearQueue();
    audio.speakCategory('correct');
    $('baker').classList.add('cheer');
    setTimeout(() => $('baker').classList.remove('cheer'), 700);
    clearTimeout(hintTimer);
    served++;
    addToShelf();
    promptIdx++;
    setTimeout(nextPrompt, 1100);
  } else {
    el.classList.add('wobble');
    audio.tone('wrong');
    audio.clearQueue();
    audio.speakCategory('wrong');
    setTimeout(() => el.classList.remove('wobble'), 600);
    setTimeout(() => {
      audio.speakPhrase('which_number');
      audio.speakNumber(currentTarget);
    }, 1100);
  }
}

function addToShelf(){
  const shelf = $('shelf');
  const item = document.createElement('div');
  item.className = 'shelf-item';
  item.textContent = pick(['🧁','🍰','🎂','🍪','🥧','🍩']);
  shelf.appendChild(item);
}

function nextPrompt(){
  const r = ROUNDS[roundIdx];
  if(promptIdx >= r.prompts){
    finishRound();
    return;
  }
  currentTarget = promptList[promptIdx];
  $('hudTarget').textContent = currentTarget;
  spawnCakes();
  setTimeout(() => {
    audio.clearQueue();
    audio.speakPhrase('can_you_find');
    audio.speakNumber(currentTarget);
  }, 250);
  scheduleHint();
}

function scheduleHint(){
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => {
    cakeEls.forEach(c => {
      if(Number(c.dataset.n) === currentTarget && !c.classList.contains('served')){
        c.animate(
          [{filter:'brightness(1)'},{filter:'brightness(1.55) drop-shadow(0 0 18px #fbbf24)'},{filter:'brightness(1)'}],
          {duration:700, iterations:2}
        );
      }
    });
    audio.clearQueue();
    audio.speakNumber(currentTarget);
    scheduleHint();
  }, 6500);
}

function startRound(){
  promptIdx = 0;
  $('hudRound').textContent = (roundIdx+1) + '/4';
  promptList = shuffle(NUMS).slice(0, ROUNDS[roundIdx].prompts);
  showBanner('Round ' + (roundIdx+1));
  setTimeout(nextPrompt, 1300);
}

function finishRound(){
  clearTimeout(hintTimer);
  roundIdx++;
  audio.clearQueue();
  audio.speakCategory('round-complete');
  if(roundIdx >= ROUNDS.length){
    setTimeout(showCeleb, 1100);
  } else {
    setTimeout(startRound, 1500);
  }
}

function showCeleb(){
  showScreen('scrCeleb');
  $('celebCount').textContent = `${served} treats served!`;
  audio.clearQueue();
  audio.speakCategory('game-complete');
  setTimeout(() => { for(let i=0;i<5;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 30); }, 100);
  setTimeout(() => { for(let i=0;i<4;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 25); }, 600);
}

function startGame(){
  roundIdx = 0; served = 0;
  $('shelf').innerHTML = '';
  showScreen('scrGame');
  audio.startMusic();
  audio.speakCategory('greetings');
  setTimeout(startRound, 1400);
}

// steam puffs
(function(){
  setInterval(() => {
    if(!$('scrGame').classList.contains('active')) return;
    const s = document.createElement('div');
    s.className = 'steam';
    s.textContent = '💨';
    s.style.top = '18vh';
    s.style.left = (35 + Math.random()*30) + '%';
    s.style.setProperty('--dur', (3 + Math.random()*2) + 's');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 5000);
  }, 1500);
})();

initFx();
onTap($('btnStart'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
onTap($('btnAgain'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
</script>
</body>
</html>
