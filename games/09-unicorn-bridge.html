<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#a855f7">
<title>Unicorn Bridge · aha!</title>
<link rel="stylesheet" href="../js/engine.css">
<style>
html, body{
  background: linear-gradient(180deg, #fce7f3 0%, #f0abfc 30%, #c4b5fd 60%, #a5b4fc 100%);
  color: #4c1d95;
}
.back-home-btn{ color:#4c1d95; border-color:#fde047; }
.home-bubble{ border-color:#fde047; }

.rainbow{
  position: absolute; top: 8vh; left: 50%;
  transform: translateX(-50%);
  font-size: clamp(80px, 22vw, 160px);
  filter: drop-shadow(0 6px 14px rgba(255,255,255,0.5));
  pointer-events: none;
}

.castle-far{
  position: absolute; bottom: 38vh; right: 4vw;
  font-size: clamp(60px, 15vw, 96px);
  filter: drop-shadow(0 0 20px #fde047);
  animation: castleGlow 3s ease-in-out infinite;
  z-index: 2; pointer-events: none;
}
@keyframes castleGlow{
  0%,100%{ filter: drop-shadow(0 0 14px #fde047); transform: scale(1) }
  50%   { filter: drop-shadow(0 0 28px #fde047); transform: scale(1.04) }
}
.castle-far.opening{ animation: castleOpen 1.2s var(--bounce) forwards; }
@keyframes castleOpen{
  0%   { transform: scale(1); }
  50%  { transform: scale(1.3) rotate(-4deg); }
  100% { transform: scale(1.2) rotate(0); }
}

.cloud{
  position: absolute; pointer-events: none; opacity: 0.6;
  font-size: clamp(30px, 7vw, 50px);
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift{ from{ transform: translateX(-150px) } to { transform: translateX(110vw) } }

/* river — wide and purply, no bridge by default */
.river{
  position: absolute; bottom: 28vh; left: 0; right: 0;
  height: 12vh; z-index: 1;
  background: linear-gradient(180deg, rgba(192,132,252,0.5) 0%, rgba(124,58,237,0.85) 100%);
  box-shadow: inset 0 4px 12px rgba(255,255,255,0.5);
  overflow: hidden;
}
.river::before{
  content:''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
  animation: shimmer 3s ease-in-out infinite;
}
@keyframes shimmer{ 0%,100%{ opacity:0.4 } 50%{ opacity:1 } }

/* bridge slot row — empty until built */
.bridge-track{
  position: absolute; left: 0; right: 0;
  bottom: 32vh; z-index: 3;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(40px, 8vw, 90px);
  gap: clamp(3px, 1vw, 8px);
  pointer-events: none;
}
.slot{
  flex: 1;
  width: clamp(20px, 5vw, 30px);
  max-width: 6vw;
  height: clamp(20px, 5vw, 30px);
  border: 2px dashed rgba(76,29,149,0.35);
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  position: relative;
}
.slot.filled{ border: none; background: transparent; }
/* The actual stone fixed into a slot */
.slot-stone{
  position: absolute; inset: -10px -2px -2px -2px;
  background: linear-gradient(180deg, var(--c1), var(--c2));
  border: 3px solid #fff;
  border-radius: 50%;
  box-shadow: 0 6px 14px rgba(76,29,149,0.6), 0 0 18px #fde047, inset 0 -6px 10px rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px, 3.5vw, 20px); color:#fff;
  font-weight: 900;
  -webkit-text-stroke: 1.2px rgba(0,0,0,0.35);
  text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  animation: stoneLand 0.6s var(--bounce);
}
@keyframes stoneLand{
  0%   { transform: scale(0); }
  60%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}

/* unicorn — sits at the leftmost just-placed stone */
.unicorn{
  position: absolute; bottom: 36vh; left: 4%; z-index: 5;
  font-size: clamp(56px, 14vw, 90px);
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3));
  transition: left 0.7s cubic-bezier(0.34,1.56,0.64,1), bottom 0.7s cubic-bezier(0.34,1.56,0.64,1);
  animation: unicornIdle 1.8s ease-in-out infinite;
  pointer-events: none;
}
@keyframes unicornIdle{ 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-6px) } }
.unicorn.hop{ animation: unicornHop 0.7s var(--bounce); }
@keyframes unicornHop{
  0%   { transform: translateY(0) rotate(0); }
  50%  { transform: translateY(-40px) rotate(-12deg); }
  100% { transform: translateY(0) rotate(0); }
}
.unicorn.gallop{ animation: gallop 0.4s ease-in-out infinite; }
@keyframes gallop{
  0%,100%{ transform: translateY(0) rotate(-4deg); }
  50%   { transform: translateY(-10px) rotate(4deg); }
}

/* sparkle trail when stone snaps in */
.snap-spark{
  position: fixed; pointer-events: none; z-index: 200;
  font-size: 22px;
  animation: snapSpark 0.7s ease-out forwards;
}
@keyframes snapSpark{
  0%  { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
  100%{ transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.4); opacity: 0; }
}

/* stone yard — pool of 6 numbered stones the kid picks from */
.yard{
  position: fixed; bottom: 2vh; left: 0; right: 0;
  z-index: 6;
  display: flex; justify-content: center; align-items: flex-end;
  gap: clamp(6px, 2vw, 14px);
  padding: 0 clamp(8px, 3vw, 18px);
}
.yard::before{
  content:''; position: absolute; bottom: 0;
  left: 5%; right: 5%; height: 20px;
  background: radial-gradient(ellipse at center, rgba(92,46,2,0.55), transparent 70%);
  z-index: -1;
}
.yard-label{
  position: fixed; bottom: calc(2vh + clamp(80px, 18vw, 130px));
  left: 50%; transform: translateX(-50%); z-index: 7;
  background: rgba(255,255,255,0.92);
  border: 3px solid #4c1d95; border-radius: 14px;
  padding: 4px 12px;
  font-size: 12px; font-weight: 900; color:#4c1d95;
  letter-spacing: 1px;
}
.yard-stone{
  position: relative;
  width: clamp(70px, 16vw, 110px);
  aspect-ratio: 1 / 1;
  cursor: pointer; touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s var(--bounce);
}
.yard-stone:active{ transform: scale(0.92); }
.yard-disc{
  position: relative;
  width: 100%; height: 100%;
  background: linear-gradient(180deg, var(--c1), var(--c2));
  border: 4px solid #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 16px rgba(76,29,149,0.45), inset 0 -8px 14px rgba(0,0,0,0.2);
}
.yard-stone .yard-num{
  font-size: clamp(28px, 7vw, 44px); color:#fff;
  -webkit-text-stroke: 2px rgba(0,0,0,0.45);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  font-weight: 900;
}
.yard-stone.flying{ pointer-events: none; }
.yard-stone.wobble{ animation: wobble 0.5s ease-in-out; }

/* yard color palette (rainbow tied to number for consistency) */
.s1{ --c1:#fca5a5; --c2:#dc2626; }
.s2{ --c1:#fdba74; --c2:#ea580c; }
.s3{ --c1:#fde047; --c2:#ca8a04; }
.s4{ --c1:#86efac; --c2:#16a34a; }
.s5{ --c1:#93c5fd; --c2:#2563eb; }
.s6{ --c1:#c4b5fd; --c2:#7c3aed; }

.progress-pill{
  position: fixed; top: max(74px, env(safe-area-inset-top, 12px) + 70px);
  left: 50%; transform: translateX(-50%); z-index: 7;
  background: rgba(255,255,255,0.92);
  border: 3px solid #4c1d95; border-radius: 20px;
  padding: 6px 12px;
  font-size: 13px; font-weight: 900; color:#4c1d95;
}

.celeb-big{ -webkit-text-stroke:3px #4c1d95; text-shadow:4px 6px 0 #fde047; }
.celeb-count{ color:#4c1d95; text-shadow:2px 2px 0 #fff; }
</style>
</head>
<body>

<a href="../index.html" class="back-home-btn">← Home</a>
<a href="../index.html" class="home-bubble" id="homeBubble" style="display:none">🏠</a>

<div id="scrTitle" class="screen active">
  <div class="title-wrap">
    <div class="title-big">UNICORN BRIDGE</div>
    <div class="title-hero">🦄</div>
    <div class="title-sub">Build the bridge stone by stone!</div>
    <button class="start-btn" id="btnStart">🦄 Start Building</button>
  </div>
</div>

<div id="scrGame" class="screen">
  <div class="hud">
    <span class="hud-prompt">Place stone</span>
    <span class="hud-target" id="hudTarget">11</span>
  </div>
  <div class="hud-round" id="hudRound">1/4</div>

  <div class="rainbow">🌈</div>
  <div class="castle-far" id="castle">🏰</div>

  <div class="river"></div>
  <div class="bridge-track" id="bridge"></div>

  <div class="unicorn" id="unicorn">🦄</div>

  <div class="progress-pill"><span id="progress">0</span> / 16 stones</div>
  <div class="yard-label">STONE YARD</div>
  <div class="yard" id="yard"></div>

  <div class="banner" id="banner">Round 1</div>
</div>

<div id="scrCeleb" class="screen">
  <div class="celeb-wrap">
    <div class="celeb-big">UNICORN MADE IT!</div>
    <div class="title-hero">🦄</div>
    <div class="celeb-count" id="celebCount">All 16 bridge stones placed!</div>
    <button class="start-btn" id="btnAgain">🦄 Play Again</button>
  </div>
</div>

<canvas id="fxCanvas" style="position:fixed;inset:0;z-index:150;pointer-events:none"></canvas>

<script src="../js/engine.js"></script>
<script>
const audio = new GameAudio({ base: '../audio/' });
const NUMS = [8,9,10,11,12,13];
const S_CLASSES = ['s1','s2','s3','s4','s5','s6'];
const TOTAL_STONES = 16;

let roundIdx = 0, promptIdx = 0, placed = 0;
let currentTarget = null;
let promptList = [];
let hintTimer = null;
let yardEls = [];
let bridgeBusy = false;

// ─── Build the empty bridge slots once ───────────────────────────
function buildBridgeSlots(){
  const track = $('bridge');
  track.innerHTML = '';
  for(let i = 0; i < TOTAL_STONES; i++){
    const s = document.createElement('div');
    s.className = 'slot';
    s.id = 'slot-' + i;
    track.appendChild(s);
  }
}

// ─── Refresh the stone yard (6 numbered stones in random order) ──
function spawnYard(){
  const yard = $('yard');
  yard.innerHTML = '';
  yardEls = [];
  const ordering = shuffle(NUMS);
  ordering.forEach((n, i) => {
    const cls = S_CLASSES[(n - NUMS[0]) % S_CLASSES.length];  // colour by value
    const stone = document.createElement('div');
    stone.className = 'yard-stone';
    stone.dataset.n = n;
    stone.innerHTML = `
      <div class="yard-disc ${cls}">
        <span class="yard-num">${n}</span>
      </div>`;
    onTap(stone, () => handleYardTap(stone, n));
    yard.appendChild(stone);
    yardEls.push(stone);
  });
}

function handleYardTap(el, n){
  if(bridgeBusy || el.classList.contains('flying')) return;
  if(n === currentTarget){
    bridgeBusy = true;
    placeStone(el, n);
  } else {
    el.classList.add('wobble');
    audio.tone('wrong');
    audio.clearQueue();
    audio.speakCategory('wrong');
    setTimeout(() => el.classList.remove('wobble'), 600);
    setTimeout(() => {
      audio.speakPhrase('which_number');
      audio.speakNumber(currentTarget);
    }, 1100);
  }
}

// Stone flies from yard → up into the next bridge slot → unicorn hops to it
function placeStone(el, n){
  el.classList.add('flying');
  const stoneRect = el.getBoundingClientRect();
  const slot = $('slot-' + placed);
  const slotRect = slot.getBoundingClientRect();
  const startX = stoneRect.left + stoneRect.width/2;
  const startY = stoneRect.top + stoneRect.height/2;
  const endX   = slotRect.left + slotRect.width/2;
  const endY   = slotRect.top + slotRect.height/2;

  // Clone the stone disc; let it fly free
  const flyer = document.createElement('div');
  flyer.className = 'yard-disc ' + (el.querySelector('.yard-disc').className.match(/s\d/) || ['s1'])[0];
  flyer.innerHTML = `<span class="yard-num">${n}</span>`;
  flyer.style.position = 'fixed';
  flyer.style.left = (startX - stoneRect.width/2) + 'px';
  flyer.style.top  = (startY - stoneRect.height/2) + 'px';
  flyer.style.width  = stoneRect.width + 'px';
  flyer.style.height = stoneRect.height + 'px';
  flyer.style.zIndex = 9;
  flyer.style.pointerEvents = 'none';
  document.body.appendChild(flyer);
  // Hide the original yard stone while it "flies"
  el.style.visibility = 'hidden';

  const dx = endX - startX, dy = endY - startY;
  const peakY = Math.min(startY, endY) - 80;  // arc peak
  flyer.animate(
    [
      { transform: 'translate(0,0) scale(1) rotate(0deg)', offset: 0 },
      { transform: `translate(${dx*0.5}px, ${peakY - startY}px) scale(0.9) rotate(180deg)`, offset: 0.5 },
      { transform: `translate(${dx}px, ${dy}px) scale(0.55) rotate(360deg)`, offset: 1 }
    ],
    { duration: 650, easing: 'cubic-bezier(0.45,0.05,0.55,0.95)', fill: 'forwards' }
  );
  audio.tone('whoosh');
  setTimeout(() => {
    flyer.remove();
    fillSlot(slot, n);
    starBurstAround(endX, endY);
    audio.tone('sparkle');
    audio.clearQueue();
    audio.speakCategory('correct');
    hopUnicornTo(endX);
    placed++;
    $('progress').textContent = placed;
    promptIdx++;
    setTimeout(() => {
      bridgeBusy = false;
      if(placed >= TOTAL_STONES) finishBridge();
      else nextPrompt();
    }, 850);
  }, 700);
}

function fillSlot(slot, n){
  slot.classList.add('filled');
  const colorIdx = (n - NUMS[0]) % S_CLASSES.length;
  const cls = S_CLASSES[colorIdx];
  slot.innerHTML = `<div class="slot-stone ${cls}">${n}</div>`;
}

function starBurstAround(x, y){
  const e = ['✨','⭐','💫','🌟'];
  for(let i = 0; i < 8; i++){
    const s = document.createElement('div');
    s.className = 'snap-spark'; s.textContent = pick(e);
    s.style.left = x + 'px'; s.style.top = y + 'px';
    const a = (Math.PI*2*i)/8, d = 60 + Math.random()*30;
    s.style.setProperty('--dx', (Math.cos(a)*d) + 'px');
    s.style.setProperty('--dy', (Math.sin(a)*d) + 'px');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }
}

function hopUnicornTo(slotCenterX){
  const u = $('unicorn');
  // Convert slot's screen X to a percentage of viewport for `left:%` positioning
  const pct = (slotCenterX / innerWidth) * 100;
  // Leave some room so the unicorn isn't centered ON the stone — sit just left of it
  u.style.left = (pct - 6) + '%';
  u.classList.add('hop');
  setTimeout(() => u.classList.remove('hop'), 700);
}

function nextPrompt(){
  if(promptIdx >= 4){
    finishRound();
    return;
  }
  currentTarget = promptList[promptIdx];
  $('hudTarget').textContent = currentTarget;
  spawnYard();  // re-shuffle yard each prompt
  setTimeout(() => {
    audio.clearQueue();
    audio.speakPhrase('tap_the_number');
    audio.speakNumber(currentTarget);
  }, 250);
  scheduleHint();
}

function scheduleHint(){
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => {
    yardEls.forEach(s => {
      if(Number(s.dataset.n) === currentTarget){
        s.animate(
          [{filter:'brightness(1)'},{filter:'brightness(1.6) drop-shadow(0 0 18px #fde047)'},{filter:'brightness(1)'}],
          {duration:700, iterations:2}
        );
      }
    });
    audio.clearQueue();
    audio.speakNumber(currentTarget);
    scheduleHint();
  }, 6500);
}

function startRound(){
  promptIdx = 0;
  $('hudRound').textContent = (roundIdx + 1) + '/4';
  promptList = shuffle(NUMS).slice(0, 4);
  showBanner('Round ' + (roundIdx + 1), 'Build the next section');
  setTimeout(nextPrompt, 1300);
}

function finishRound(){
  clearTimeout(hintTimer);
  roundIdx++;
  audio.clearQueue();
  audio.speakCategory('round-complete');
  if(roundIdx >= 4){
    setTimeout(finishBridge, 800);
  } else {
    setTimeout(startRound, 1500);
  }
}

// Bridge complete — unicorn gallops across to the castle
function finishBridge(){
  clearTimeout(hintTimer);
  const u = $('unicorn');
  u.classList.add('gallop');
  u.style.transition = 'left 2.5s cubic-bezier(0.45,0.05,0.55,0.95)';
  u.style.left = '82%';
  audio.tone('whoosh');
  setTimeout(() => $('castle').classList.add('opening'), 2400);
  for(let i = 0; i < 6; i++){
    setTimeout(() => burstConfetti(Math.random()*innerWidth, innerHeight*0.35, 28), 1200 + i*260);
  }
  setTimeout(showCeleb, 3200);
}

function showCeleb(){
  showScreen('scrCeleb');
  $('celebCount').textContent = `${placed} bridge stones placed!`;
  audio.clearQueue();
  audio.speakCategory('game-complete');
  setTimeout(() => { for(let i=0;i<5;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 30); }, 100);
  setTimeout(() => { for(let i=0;i<4;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 25); }, 600);
}

function startGame(){
  roundIdx = 0; placed = 0;
  $('progress').textContent = '0';
  $('unicorn').classList.remove('gallop');
  $('unicorn').style.transition = '';
  $('unicorn').style.left = '4%';
  $('castle').classList.remove('opening');
  buildBridgeSlots();
  showScreen('scrGame');
  audio.startMusic();
  audio.speakCategory('greetings');
  setTimeout(startRound, 1400);
}

(function(){
  for(let i = 0; i < 5; i++){
    const c = document.createElement('div');
    c.className = 'cloud';
    c.textContent = pick(['☁️','⛅','☁️']);
    c.style.top = (5 + Math.random()*22) + 'vh';
    c.style.animationDuration = (40 + Math.random()*30) + 's';
    c.style.animationDelay = (-Math.random()*60) + 's';
    document.body.appendChild(c);
  }
})();

initFx();
onTap($('btnStart'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
onTap($('btnAgain'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
</script>
</body>
</html>
