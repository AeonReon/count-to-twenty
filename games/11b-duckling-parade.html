<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0ea5e9">
<title>Duckling Parade · aha!</title>
<link rel="stylesheet" href="../js/engine.css">
<style>
html, body{
  background: linear-gradient(180deg, #fef3c7 0%, #bae6fd 35%, #7dd3fc 100%);
  color: #075985;
}
.back-home-btn{ color:#075985; border-color:#fde047; }
.sun{ position: absolute; top: 11vh; right: 8vw; font-size: clamp(50px, 12vw, 80px); filter: drop-shadow(0 0 25px #fde047); animation: heroFloat 3s ease-in-out infinite; }

.mama{
  position: absolute; bottom: 28vh; left: 5vw;
  font-size: clamp(72px, 17vw, 110px);
  z-index: 5;
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3));
  animation: heroFloat 2.4s ease-in-out infinite;
}
.mama.cheer{ animation: cheer 0.7s var(--bounce); }
@keyframes cheer{ 0%{transform:scale(1)} 30%{transform:scale(1.2) rotate(-10deg)} 60%{transform:scale(1.1) rotate(10deg)} 100%{transform:scale(1)} }

.parade-row{
  position: absolute; bottom: 22vh; left: 18vw; right: 4vw; height: 14vh;
  z-index: 4; pointer-events: none;
  display: flex; align-items: flex-end; gap: 6px;
}
.parade-spot{
  width: clamp(50px, 12vw, 80px); height: 100%;
  border: 2px dashed rgba(7,89,133,0.4); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(20px, 5vw, 32px); color:rgba(7,89,133,0.4);
  font-weight: 900;
}
.parade-spot.filled{
  border: none;
  font-size: clamp(40px, 10vw, 60px); color: #fbbf24;
  animation: spotFill 0.7s var(--bounce);
}
@keyframes spotFill{ 0%{ transform: scale(0); } 60%{ transform: scale(1.2); } 100%{ transform: scale(1); } }

.pond{
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 22vh; z-index: 2;
  background: linear-gradient(180deg, rgba(2,132,199,0.4) 0%, rgba(7,89,133,0.8) 100%);
  box-shadow: inset 0 6px 12px rgba(255,255,255,0.4);
}

.ducklings{
  position: absolute; top: 15vh; left: 0; right: 0; bottom: 38vh;
  z-index: 3;
}
.duckling{
  position: absolute; cursor: pointer; touch-action: manipulation;
  width: clamp(72px, 16vw, 100px); height: clamp(72px, 16vw, 100px);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s var(--bounce);
  animation: bobble 2.6s ease-in-out infinite;
}
@keyframes bobble{ 0%,100%{ transform: translateY(0) rotate(-3deg) } 50%{ transform: translateY(-6px) rotate(3deg) } }
.duckling:active{ transform: scale(0.92); }
.duck-body{
  position: absolute; inset: 0;
  background: radial-gradient(circle at 35% 30%, #fef9c3, #facc15);
  border-radius: 50% 50% 45% 45%;
  border: 4px solid #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
}
.duck-body::after{ content:''; position:absolute; top: 38%; left: 35%; width:11px; height:11px; background:#1e293b; border-radius:50%; }
.duck-body::before{ content:''; position:absolute; top: 50%; left: 16%; width:16px; height:10px; background:#f97316; border-radius:50%; }
.duck-num{
  position: relative; z-index: 3;
  font-size: clamp(26px, 6.5vw, 40px); color:#fff;
  -webkit-text-stroke: 2px rgba(0,0,0,0.45);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4); font-weight: 900;
  margin-top: 4%; margin-left: 12%;
}
.duckling.wobble{ animation: wobble 0.5s ease-in-out; }
.duckling.lined{ pointer-events: none; }

.next-pill{
  position: fixed; bottom: 2vh; left: 50%;
  transform: translateX(-50%); z-index: 7;
  background: linear-gradient(180deg, #fde047 0%, #fbbf24 100%);
  border: 4px solid #075985; border-radius: 22px;
  padding: 10px 22px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.3);
}
.next-pill-label{ font-size: 13px; font-weight: 900; color:#075985; letter-spacing: 1px; }
.next-pill-num{
  font-size: clamp(46px, 12vw, 68px); color:#dc2626;
  -webkit-text-stroke: 3px #075985;
  text-shadow: 2px 3px 0 #075985; font-weight: 900; line-height: 1;
}

.progress-pill{
  position: fixed; top: max(74px, env(safe-area-inset-top, 12px) + 70px);
  right: 14px; z-index: 7;
  background: rgba(255,255,255,0.95);
  border: 3px solid #075985; border-radius: 18px;
  padding: 6px 12px;
  font-size: 13px; font-weight: 900; color:#075985;
}

.celeb-big{ -webkit-text-stroke:3px #075985; text-shadow:4px 6px 0 #fde047; }
.celeb-count{ color:#075985; text-shadow:2px 2px 0 #fff; }
</style>
</head>
<body>

<a href="../index.html" class="back-home-btn">← Home</a>

<div id="scrTitle" class="screen active">
  <div class="title-wrap">
    <div class="title-big">DUCKLING PARADE</div>
    <div class="title-hero">🦆</div>
    <div class="title-sub">Line ducklings up in order — smallest first!</div>
    <button class="start-btn" id="btnStart">🦆 Start Parade</button>
  </div>
</div>

<div id="scrGame" class="screen">
  <div class="hud">
    <span class="hud-prompt">Tap duckling</span>
    <span class="hud-target" id="hudTarget">10</span>
  </div>
  <div class="hud-round" id="hudRound">1/4</div>

  <div class="sun">☀️</div>
  <span class="mama" id="mama">🦆</span>
  <div class="parade-row" id="paradeRow"></div>
  <div class="pond"></div>
  <div class="ducklings" id="ducklings"></div>

  <div class="progress-pill">🦆 <span id="progress">0</span> / 16</div>
  <div class="next-pill">
    <span class="next-pill-label">NEXT</span>
    <span class="next-pill-num" id="nextNum">10</span>
  </div>
  <div class="banner" id="banner">Round 1</div>
</div>

<div id="scrCeleb" class="screen">
  <div class="celeb-wrap">
    <div class="celeb-big">ALL IN LINE!</div>
    <div class="title-hero">🦆</div>
    <div class="celeb-count" id="celebCount">All ducklings parading!</div>
    <button class="start-btn" id="btnAgain">🦆 Play Again</button>
  </div>
</div>

<canvas id="fxCanvas" style="position:fixed;inset:0;z-index:150;pointer-events:none"></canvas>

<script src="../js/engine.js"></script>
<script>
const audio = new GameAudio({ base: '../audio/' });
const NUMS = [10,11,12,13,14,15];

let roundIdx = 0, totalLined = 0, nextIdx = 0;
let currentOrder = [];
let busy = false;
let duckEls = [];

function spawnDucks(){
  const area = $('ducklings');
  area.innerHTML = '';
  duckEls = [];
  const w = area.clientWidth || innerWidth;
  const h = area.clientHeight || (innerHeight*0.45);
  // scattered grid
  const cols = 3, rows = 2;
  const cw = w/cols, ch = h/rows;
  const positions = [];
  for(let r = 0; r < rows; r++){
    for(let c = 0; c < cols; c++){
      positions.push({
        x: cw*c + cw*0.5 - 50 + (Math.random()-0.5)*cw*0.3,
        y: ch*r + ch*0.5 - 50 + (Math.random()-0.5)*ch*0.25
      });
    }
  }
  shuffle(NUMS).forEach((n, i) => {
    const d = document.createElement('div');
    d.className = 'duckling';
    d.dataset.n = n;
    d.innerHTML = `<div class="duck-body"></div><span class="duck-num">${n}</span>`;
    d.style.left = positions[i].x + 'px';
    d.style.top  = positions[i].y + 'px';
    d.style.animationDelay = (-Math.random()*2.6) + 's';
    onTap(d, () => handleDuckTap(d, n));
    area.appendChild(d);
    duckEls.push(d);
  });
  // Build parade row spots
  const row = $('paradeRow');
  row.innerHTML = '';
  NUMS.forEach(() => {
    const s = document.createElement('div');
    s.className = 'parade-spot';
    s.textContent = '?';
    row.appendChild(s);
  });
}

function handleDuckTap(el, n){
  if(busy || el.classList.contains('lined')) return;
  const want = currentOrder[nextIdx];
  if(n === want){
    busy = true;
    el.classList.add('lined');
    audio.tone('ding');
    audio.clearQueue();
    audio.speakCategory('correct');
    // Duck flies to its parade spot
    const spot = $('paradeRow').children[nextIdx];
    const sR = spot.getBoundingClientRect();
    const dR = el.getBoundingClientRect();
    const dx = (sR.left + sR.width/2) - (dR.left + dR.width/2);
    const dy = (sR.top + sR.height/2) - (dR.top + dR.height/2);
    el.animate(
      [
        { transform: 'translate(0,0) scale(1)' },
        { transform: `translate(${dx}px, ${dy}px) scale(0.7)`, opacity: 0 }
      ],
      { duration: 700, easing: 'cubic-bezier(0.45,0.05,0.55,0.95)', fill: 'forwards' }
    );
    setTimeout(() => {
      spot.classList.add('filled');
      spot.textContent = '🐤';
    }, 600);
    $('mama').classList.add('cheer');
    setTimeout(() => $('mama').classList.remove('cheer'), 700);
    starBurst(sR.left + sR.width/2, sR.top + sR.height/2);
    nextIdx++;
    totalLined++;
    $('progress').textContent = totalLined;
    if(nextIdx >= currentOrder.length){
      setTimeout(() => { busy = false; finishRound(); }, 900);
    } else {
      const next = currentOrder[nextIdx];
      $('hudTarget').textContent = next;
      $('nextNum').textContent = next;
      setTimeout(() => {
        audio.clearQueue();
        audio.speakNumber(next);
        busy = false;
      }, 800);
    }
  } else {
    el.classList.add('wobble');
    audio.tone('wrong');
    audio.clearQueue();
    audio.speakCategory('wrong');
    setTimeout(() => el.classList.remove('wobble'), 600);
    setTimeout(() => {
      audio.speakPhrase('which_number');
      audio.speakNumber(want);
    }, 1100);
  }
}

function startRound(){
  $('hudRound').textContent = (roundIdx+1) + '/4';
  currentOrder = NUMS.slice().sort((a,b) => a - b);
  nextIdx = 0;
  $('hudTarget').textContent = currentOrder[0];
  $('nextNum').textContent = currentOrder[0];
  spawnDucks();
  showBanner('Round ' + (roundIdx+1), 'Smallest first!');
  setTimeout(() => {
    audio.clearQueue();
    audio.speakPhrase('tap_the_number');
    audio.speakNumber(currentOrder[0]);
  }, 1300);
}

function finishRound(){
  roundIdx++;
  audio.clearQueue();
  audio.speakCategory('round-complete');
  if(roundIdx >= 4){
    setTimeout(showCeleb, 1100);
  } else {
    setTimeout(startRound, 1500);
  }
}

function showCeleb(){
  showScreen('scrCeleb');
  $('celebCount').textContent = `${totalLined} ducklings lined up!`;
  audio.clearQueue();
  audio.speakCategory('game-complete');
  setTimeout(() => { for(let i=0;i<5;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 30); }, 100);
  setTimeout(() => { for(let i=0;i<4;i++) burstConfetti(Math.random()*innerWidth, innerHeight*0.3, 25); }, 600);
}

function startGame(){
  roundIdx = 0; totalLined = 0;
  $('progress').textContent = '0';
  showScreen('scrGame');
  audio.startMusic();
  audio.speakCategory('greetings');
  setTimeout(startRound, 1400);
}

initFx();
onTap($('btnStart'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
onTap($('btnAgain'), () => { audio.unlock(); audio.tone('whoosh'); startGame(); });
</script>
</body>
</html>
